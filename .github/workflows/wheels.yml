name: build-wheels

on:
  push:
    tags: ["v*"] # 버전 태그에서만 풀 매트릭스 빌드
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch: # 수동 실행

jobs:
  build_wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, macdep: "" }
          - { os: windows-latest, macdep: "" }
          - { os: macos-13, macdep: "13.0" } # x86_64
          - { os: macos-14, macdep: "14.0" } # arm64
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *_i686 *-win32 pp*"
          CIBW_ARCHS_MACOS: "auto"
          CIBW_ARCHS_LINUX: "x86_64"
          # macOS: libomp로 OpenMP 유지. deployment target을 러너 macOS에 맞춰
          # delocate의 wheel-tag/버전 충돌 회피.
          CIBW_BEFORE_ALL_MACOS: "brew install libomp"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macdep }}"
          # 빌드 후 import 스모크 — numpy만 (sklearn은 테스트 컨테이너서 scipy 소스빌드 유발)
          CIBW_TEST_REQUIRES: "numpy"

          # [수정] 테스트 환경의 pip가 scipy 소스 빌드를 시도하지 못하도록 바이너리 휠 설치만 강제합니다.
          # 만약 의존성을 아예 설치하고 싶지 않다면 "PIP_NO_DEPS=1"로 변경하십시오.
          CIBW_TEST_ENVIRONMENT: "PIP_ONLY_BINARY=:all:"

          CIBW_TEST_COMMAND: >
            python -c "import numpy as np;
            from oqboost import OQBoostClassifier, OQBoostRegressor;
            rng=np.random.default_rng(0);
            X=rng.standard_normal((300,6)); y=(X[:,0]*X[:,1]>0).astype(int);
            p=OQBoostClassifier(n_estimators=40).fit(X,y).predict_proba(X);
            r=OQBoostRegressor(n_estimators=40).fit(X,y.astype(float)).predict(X);
            assert p.shape==(300,2) and r.shape==(300,); print('smoke ok')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with: { name: sdist, path: ./dist/*.tar.gz }

  # release 발행 시에만 PyPI 업로드. repo Secret `PYPI_API_TOKEN` 필요.
  publish:
    name: publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
